# Example template profile — pptx only.
# Synthetic. Represents a user who supplied a .pptx template at install
# and wants pptx as their default render target.

profile_version: "1.0.0"
preferred_output: pptx

templates:
  pptx:
    path: "~/templates/neutral-corporate.pptx"
    layout_map:
      title: "Title Slide"
      section_break: "Section Divider"
      claim_with_evidence: "Claim + Supporting"
      three_pillars: "Three Column"
      comparison: "Two Column Compare"
      quote: "Pull Quote"
      image_with_caption: "Image + Caption"
      metrics: "Stat Block"
      timeline: "Timeline Horizontal"
      callout: "Big Statement"
    quality_score: 88

style_tokens:
