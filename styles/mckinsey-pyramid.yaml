style_version: "1.0.0"
name: McKinsey pyramid
description: |
  Pyramid Principle. Lead with the conclusion. Support with exactly three
  reasons. Drill down only where the executive asks. Optimized for time-
  constrained executive briefings and decision-support decks.
authority: "Barbara Minto (The Pyramid Principle); McKinsey & Company"

arc_set: [pyramid, problem-first, provocation]
default_arc: pyramid

beats:
  hook:        {min: 1, max: 1, layout_intents: [callout, claim_with_evidence]}
  claim:       {min: 1, max: 1, layout_intents: [callout, three_pillars]}
  context:     {min: 1, max: 2, layout_intents: [claim_with_evidence, metrics, timeline]}
  problem:     {min: 1, max: 2, layout_intents: [claim_with_evidence, metrics, comparison]}
  evidence:    {min: 3, max: 6, layout_intents: [three_pillars, claim_with_evidence, metrics, comparison]}
  tension:     {min: 0, max: 1, layout_intents: [comparison, callout]}
  resolution:  {min: 1, max: 1, layout_intents: [three_pillars, callout]}
  callback:    {min: 0, max: 1, layout_intents: [callout]}
  next:        {min: 1, max: 1, layout_intents: [callout, three_pillars]}

density:
  slides_per_minute: 1.5
  max_body_blocks_per_slide: 4
  prefer_visual: false
  prefer_quote_over_metric: false

posture: expert-as-hero
evidence_weighting: data-leaning

voice_notes: |
  Open with the answer. Support with three (always three) reasons.
  Each slide is scannable in 5 seconds — title says the point, body proves it.
  Speaker reads the executive room and drills only where pushed.
