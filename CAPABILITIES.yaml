# ============================================================================
# CAPABILITIES.yaml — single source of truth for slide-publisher capabilities
# ============================================================================
#
# Purpose
# -------
# Every skill (under plugin/skills/), every adapter (under plugin/adapters/),
# and every architecture doc (under plugin/docs/) gets ONE entry below. The
# manifest names purpose, dependencies (binaries, MCPs, Python libs, internal),
# user-facing invariants (lifted from SKILL.md prose), the matching
# architecture doc, and the current UAT exposure state.
#
# Why this exists
# ---------------
# The repo's recurring failure mode is shipping features (input-ppt support,
# auto-remediation, Figma rendering) without re-reading the SKILL.md prose that
# already governs them. The UAT wrapper at uat/server.py then exposes things
# wrong: skipped dependencies (LibreOffice surprise), bypassed architectures
# (raw-text Figma instead of template-instance), or not exposed at all
# (auto-remediation was missing until a user complaint). A preflight check
# consuming this file mechanically prevents that drift.
#
# Schema (one entry per capability)
# ---------------------------------
#   - name:                <kebab-case skill OR snake_case adapter>
#     type:                skill | adapter | shared | doc
#     purpose:             <one-line, ≤140 chars>
#     file_path:           <path relative to plugin/>
#     skill_md_path:       <SKILL.md path if backed by a skill>
#     architecture_doc:    <relative path under docs/ if applicable>
#     dependencies:
#       external_binaries: []
#       mcps:              []
#       python_libraries:  []
#       plugin_internal:   []
#     user_facing_invariants: []
#     uat_exposed:         yes | no | partial
#     uat_exposure_notes:  <one-line description of HOW or WHAT'S MISSING>
#
# Generated 2026-06-01, hand-curated. See uat/preflight.py for the consumer.
# ============================================================================


# ============================================================================
# SHARED MODULE
# ============================================================================

