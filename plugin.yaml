# slide-publisher — Cowork plugin manifest
name: slide-publisher
version: 0.2.0-dev
display_name: Slide Publisher
tagline: Story-aware slide generation across PowerPoint and Figma Slides.
description: |
  Compile a story (audience, throughline, beats, evidence) into a portable slide IR,
  then render to PowerPoint or Figma Slides. Each render produces a loss manifest
  naming what's lossless, lossy, dropped, or annotated. Built on a translation pattern
  for heterogeneous deck targets, applied to slides.
maintainer: designisagoodidea-2026
homepage: https://designisagoodidea-2026.github.io/slide-publisher/
license: MIT

requires:
  cowork: ">=0.x"
  python: ">=3.10"

skills:
  # template-setup pipeline (v0.1)
  - template-setup              # one-time install wizard; produces the template profile
  - template-classifier         # detects template vs. deck-with-implicit-pattern
  - template-synthesizer-pptx   # deck-with-implicit-pattern → synthesized .pptx template
  - template-synthesizer-figma  # deck-with-implicit-pattern → synthesized Figma templates
  - template-extractor-pptx     # template .pptx → profile entry
  - template-extractor-figma    # template Figma file → profile entry
  - template-validator          # structural quality check; green/yellow/red findings
  - remediation-apply-pptx      # auto-fix a failing pptx template (layout rename + recommendations)
  - remediation-apply-figma     # auto-fix a failing figma template via MCP
  # storytelling input (v0.2)
  - storytelling-style-library  # discover, validate, and author storytelling styles
  - story-from-outline          # structured outline → IR, style-aware (successor to story-compiler)
  - story-from-interview        # interactive Q&A → IR, style-aware
  - story-from-transcript       # transcript / long-form text → IR, style-aware
  - story-from-deck             # reverse-engineer an existing .pptx into IR
  - story-compiler              # v0.1 outline compiler — retained for back-compat
  - slide-ir-validator          # validates an IR against schema + lint rules
  # rendering (v0.1)
  - render-pptx                 # IR + template profile → .pptx
  - render-figma                # IR + template profile → Figma Slides
  # multi-format input + visual feedback (v0.1)
  - input-pdf                   # accept PDF (URL or path) as a deck source
  - input-png                   # accept PNG screenshots as a deck source
  - input-ppt                   # convert legacy .ppt → .pptx via LibreOffice
  - visual-diff                 # per-slide phash + SSIM, HTML side-by-side report
  - iterate-to-parity           # render→diff→adjust loop until visual convergence
  # v0.3+ (stubs)
  # - template-extractor-gslides
  # - template-synthesizer-gslides
  # - render-gslides

mcps:
  required:
    - figma                   # user supplies their own Figma MCP credentials
  # v0.2:
  # optional:
  #   - google-slides

suggested_global_skills:
  - anthropic-skills:storytelling
  - anthropic-skills:pptx

# voice_constraints in the IR is an optional pointer to any user-supplied voice/style
# skill. The plugin ships no voice defaults and suggests no specific voice skill.
